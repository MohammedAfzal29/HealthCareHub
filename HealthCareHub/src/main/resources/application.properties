# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=9092

# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/healthcare_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ?? DO NOT ADD hibernate.dialect (Spring Boot auto detects)

# ===============================
# LOGGING CONFIGURATION
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===============================
# JWT CONFIGURATION (if used)
# ===============================
jwt.secret=yourSecretKeyHere
jwt.expiration=86400000

# ===============================
# FILE UPLOAD CONFIGURATION
# ===============================
assignment.upload.path=uploads/